# Base compose for the full VedaAI stack.
#
# Local development (build images locally, expose all ports):
#   docker compose up -d --build
#
# Production on EC2 (pull pre-built images from GHCR, only :80 public):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  redis:
    image: redis:7-alpine
    container_name: vedaai-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks: [app]
    ports:
      # Exposed for local dev only — removed by docker-compose.prod.yml.
      - "127.0.0.1:6379:6379"

  backend:
    image: ${BACKEND_IMAGE:-vedaai-backend:local}
    container_name: vedaai-backend
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      MONGODB_URI: ${MONGODB_URI}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      PORT: "4000"
      CORS_ORIGIN: ${CORS_ORIGIN}
      NODE_ENV: production
    depends_on:
      - redis
    networks: [app]
    ports:
      - "127.0.0.1:4000:4000"

  frontend:
    image: ${FRONTEND_IMAGE:-vedaai-frontend:local}
    container_name: vedaai-frontend
    restart: unless-stopped
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    depends_on:
      - backend
    networks: [app]
    ports:
      - "127.0.0.1:3000:3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: vedaai-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks: [app]
    ports:
      - "80:80"

networks:
  app:
    driver: bridge

volumes:
  redis-data:
