name: Build & Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  IMAGE_REPO: ${{ github.event.repository.name }}

jobs:
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      backend_image:  ${{ steps.tags.outputs.backend_image }}
      frontend_image: ${{ steps.tags.outputs.frontend_image }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: tags
        name: Compute image tags
        run: |
          # Repository name component must be lowercase for OCI registries.
          BASE="${REGISTRY}/${IMAGE_OWNER}/${IMAGE_REPO}"
          BASE="${BASE,,}"
          SHA="${GITHUB_SHA::7}"
          echo "backend_image=${BASE}-backend:${SHA}"   >> "$GITHUB_OUTPUT"
          echo "frontend_image=${BASE}-frontend:${SHA}" >> "$GITHUB_OUTPUT"
          echo "backend_latest=${BASE}-backend:latest"  >> "$GITHUB_OUTPUT"
          echo "frontend_latest=${BASE}-frontend:latest" >> "$GITHUB_OUTPUT"

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.backend_image }}
            ${{ steps.tags.outputs.backend_latest }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.tags.outputs.frontend_image }}
            ${{ steps.tags.outputs.frontend_latest }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  deploy:
    name: Deploy on EC2
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          source:   "docker-compose.yml,docker-compose.prod.yml,nginx/nginx.conf"
          target:   "/home/${{ secrets.EC2_USER }}/vedaai"

      - name: Set up .env on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p "/home/${{ secrets.EC2_USER }}/vedaai"
            echo "${{ secrets.PRODUCTION_ENV }}" > "/home/${{ secrets.EC2_USER }}/vedaai/.env"

      - name: Pull & restart stack
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "/home/${{ secrets.EC2_USER }}/vedaai"

            # Replace BACKEND_IMAGE / FRONTEND_IMAGE lines in-place (or append).
            sed -i '/^BACKEND_IMAGE=/d'  .env
            sed -i '/^FRONTEND_IMAGE=/d' .env
            echo "BACKEND_IMAGE=${{ needs.build.outputs.backend_image }}"   >> .env
            echo "FRONTEND_IMAGE=${{ needs.build.outputs.frontend_image }}" >> .env

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin

            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-build --remove-orphans
            docker image prune -f
