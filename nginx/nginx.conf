worker_processes auto;
events { worker_connections 1024; }

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 25m;

  # WebSocket upgrade map.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream frontend_upstream { server frontend:3000; }
  upstream backend_upstream  { server backend:4000; }

  server {
    listen 80 default_server;
    server_name _;

    # ----- Backend HTTP API -----
    location /api/ {
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://backend_upstream;
      # Claude generation runs synchronously in the worker but the HTTP
      # endpoints only enqueue/read — 60s is plenty of headroom.
      proxy_read_timeout 60s;
    }

    # ----- Backend health -----
    location = /health {
      proxy_pass http://backend_upstream;
    }

    # ----- Socket.IO upgrade -----
    location /socket.io/ {
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade           $http_upgrade;
      proxy_set_header Connection        $connection_upgrade;
      proxy_pass http://backend_upstream;
      proxy_read_timeout  3600s;
      proxy_send_timeout  3600s;
    }

    # ----- Next.js frontend (everything else) -----
    location / {
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # Next.js HMR / RSC streams also use upgrade.
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_pass http://frontend_upstream;
    }
  }
}
